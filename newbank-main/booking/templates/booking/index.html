<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Bookings</title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'booking/styles.css' %}">
    </head>
    <body>
        <div>
            <h1>Bookings</h1>
                <ul>
                    {% for booking in bookings %}
                        <li>{{ booking.booked_by.username }}: {{ booking.reason }} ({{ booking.date }} - {{ booking.time }})</li>
                    {% endfor %}
                </ul>
                <a href="{% url 'home:index' %}">&lt;&lt; Home</a>
                <a href="{% url 'booking:add' %}">Book a visit</a>
        </div>
    </body>
</html>
